<div id="seccion-respuesta-solicitud">
    <div class="mb-6">
        <h2 class="text-xl font-semibold mb-4">Respuesta de Solicitud</h2>
        <div class="bg-gray-50 p-6 rounded-lg border border-gray-200">
            {% if tramite.respuesta_solicitud %}
                <p class="text-gray-700 bg-white p-3 rounded border border-gray-100 whitespace-pre-wrap">{{ tramite.respuesta_solicitud }}</p>
            {% else %}
                <p class="text-sm text-gray-400 italic">Sin respuesta (opcional)</p>
            {% endif %}

            {% if tramite.estado == 'PENDIENTE' and user.puede_aprobar %}
            <form hx-post="{% url 'tramites:responder_solicitud_hx' id=tramite.uuid %}"
                  hx-target="#seccion-respuesta-solicitud"
                  hx-swap="outerHTML"
                  class="mt-4 border-t border-gray-300 pt-4">
                {% csrf_token %}
                <label class="block text-sm font-medium text-gray-700 mb-1">Respuesta:</label>
                <textarea name="respuesta_solicitud" rows="4"
                          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm"
                          placeholder="Escriba la respuesta a la solicitud (opcional)...">{{ tramite.respuesta_solicitud }}</textarea>
                <button type="submit"
                        class="mt-2 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 text-sm">
                    Guardar Respuesta
                </button>
            </form>
            {% endif %}
        </div>
    </div>
</div>
