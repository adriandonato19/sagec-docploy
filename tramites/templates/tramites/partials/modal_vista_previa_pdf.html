<div id="modal-pdf-container" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-75">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-6xl max-h-[95vh] overflow-hidden flex flex-col transform transition-all">
        <!-- Header -->
        <div class="flex items-center justify-between p-6 border-b border-gray-200 bg-blue-900 text-white rounded-t-xl">
            <h3 class="text-xl font-bold">Vista Previa del Documento</h3>
            <button onclick="document.getElementById('modal-pdf-container').remove()" class="text-white hover:text-yellow-400 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>

        <!-- PDF Content -->
        <div class="flex-1 overflow-hidden">
            <iframe 
                src="{% url 'tramites:descargar' id=tramite.uuid %}?inline=1" 
                class="w-full h-full border-0"
                title="Vista previa del PDF">
            </iframe>
        </div>

        <!-- Footer -->
        <div class="flex justify-between items-center p-4 border-t border-gray-200 bg-gray-50 rounded-b-xl">
            <div class="text-sm text-gray-600">
                <span class="font-semibold">Referencia:</span> {{ tramite.numero_referencia|default:tramite.uuid }}
            </div>
            <div class="flex gap-3">
                <button onclick="document.getElementById('modal-pdf-container').remove()" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg font-semibold hover:bg-gray-300 transition-colors">
                    Cerrar
                </button>
                <a href="{% url 'tramites:descargar' id=tramite.uuid %}" class="px-4 py-2 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition-colors">
                    Descargar PDF
                </a>
            </div>
        </div>
    </div>
</div>
