{% extends 'base.html' %}

{% block title %}Iniciar Sesión - SAGEC{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-16">
    <div class="bg-white shadow-lg rounded-lg p-8">
        <h1 class="text-2xl font-bold text-center mb-6 text-gray-800">Iniciar Sesión</h1>
        
        <form method="post" action="{% url 'identidad:login' %}">
            {% csrf_token %}
            
            <div class="mb-4">
                <label for="username" class="block text-sm font-medium text-gray-700 mb-2">
                    Usuario / Email
                </label>
                <input type="text" 
                       name="username" 
                       id="username" 
                       required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                       placeholder="usuario@gob.pa">
            </div>
            
            <div class="mb-6">
                <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                    Contraseña
                </label>
                <input type="password" 
                       name="password" 
                       id="password" 
                       required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                       placeholder="••••••••">
            </div>
            
            <button type="submit" 
                    class="w-full bg-blue-600 text-white py-2 px-4 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium mb-4">
                Iniciar Sesión
            </button>
        </form>
        
        <p class="mt-6 text-center text-sm text-gray-600">
            Sistema Automatizado de Generación de Certificados (SAGEC)
        </p>
        <p class="mt-2 text-center text-xs text-gray-500">
            El acceso es administrado por un usuario DIRECTOR del sistema.
        </p>
    </div>
</div>
{% endblock %}
