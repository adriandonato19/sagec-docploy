{% comment %}
Componente reutilizable para tabs de navegación
Uso: {% include 'components/tabs.html' with tabs=tabs_list current=current_tab %}
{% endcomment %}

<div class="border-b border-gray-200 mb-6">
    <nav class="-mb-px flex space-x-8 overflow-x-auto">
        {% for tab in tabs %}
            <a href="{{ tab.url }}" 
               class="whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm {% if tab.active %}border-blue-500 text-blue-600{% else %}border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300{% endif %}">
                {{ tab.label }}
                {% if tab.count is not None %}
                    <span class="ml-2 px-2 py-0.5 text-xs rounded-full {% if tab.active %}bg-blue-100 text-blue-800{% else %}bg-gray-100 text-gray-600{% endif %}">
                        {{ tab.count }}
                    </span>
                {% endif %}
            </a>
        {% endfor %}
    </nav>
</div>
