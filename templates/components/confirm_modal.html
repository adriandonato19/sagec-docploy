{% comment %}
Modal de confirmación estilizado.
Se controla vía JS global: showConfirmModal(message, formEl, { variant })
variant: 'warning' (default) | 'danger'
{% endcomment %}
<div id="confirm-modal"
     class="fixed inset-0 z-[9999] hidden"
     aria-modal="true" role="dialog" aria-labelledby="confirm-modal-title">
    <!-- Backdrop -->
    <div id="confirm-modal-backdrop"
         class="absolute inset-0 bg-black/50 transition-opacity duration-200"></div>

    <!-- Panel -->
    <div class="relative flex items-center justify-center min-h-screen p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md transform transition-all duration-200">
            <div class="p-6">
                <!-- Ícono -->
                <div id="confirm-modal-icon" class="flex items-center justify-center w-12 h-12 rounded-full mx-auto mb-4 bg-yellow-100">
                    <svg class="w-6 h-6 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                        </path>
                    </svg>
                </div>

                <!-- Mensaje -->
                <h3 id="confirm-modal-title" class="text-lg font-semibold text-gray-900 text-center mb-2">
                    Confirmar Acción
                </h3>
                <p id="confirm-modal-message" class="text-sm text-gray-600 text-center mb-6"></p>

                <!-- Botones -->
                <div class="flex gap-3 justify-center">
                    <button id="confirm-modal-cancel"
                            type="button"
                            class="flex-1 px-4 py-2 rounded-lg border border-gray-300 bg-white text-gray-700 text-sm font-medium hover:bg-gray-50 transition-colors">
                        Cancelar
                    </button>
                    <button id="confirm-modal-ok"
                            type="button"
                            class="flex-1 px-4 py-2 rounded-lg text-white text-sm font-medium transition-colors bg-blue-600 hover:bg-blue-700">
                        Confirmar
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
