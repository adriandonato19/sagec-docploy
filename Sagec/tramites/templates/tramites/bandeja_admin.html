{% extends 'base.html' %}

{% block title %}Lista de Solicitudes - SAGEC{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto">
    <h1 class="text-2xl font-bold mb-6 text-gray-800">Lista de Solicitudes</h1>
    
    <!-- Filtros -->
    <div class="bg-white shadow-lg rounded-lg p-6 mb-6">
        <form hx-get="{% url 'tramites:bandeja_admin' %}" 
              hx-target="#tabla-tramites" 
              hx-trigger="submit, keyup delay:500ms from:#busqueda_input"
              class="flex gap-4 items-end">
            {% csrf_token %}
            <div class="flex-1">
                <label for="busqueda_input" class="block text-sm font-medium text-gray-700 mb-2">
                    Buscar
                </label>
                <input type="text" 
                       name="q" 
                       id="busqueda_input" 
                       value="{{ busqueda }}"
                       placeholder="Buscar por referencia, RUC, solicitante..."
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <button type="submit" 
                        class="bg-blue-600 text-white py-2 px-6 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium">
                    Filtrar
                </button>
            </div>
        </form>
    </div>
    
    <!-- Tabs -->
    {% include 'components/tabs.html' with tabs=tabs %}
    
    <!-- Tabla de trámites (se actualiza vía HTMX) -->
    <div id="tabla-tramites">
        {% include 'tramites/partials/tabla_tramites.html' %}
    </div>
</div>
{% endblock %}
