<div class="bg-white shadow-lg rounded-lg p-6 text-center"
     data-auto-noconsta="true"
     data-noconsta-description="{{ noconsta_entry.descripcion }}"
     data-noconsta-frase="{{ noconsta_entry.frase_certificacion }}">
    <div class="mb-4">
        <svg class="w-12 h-12 text-amber-500 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4.5c-.77-.833-2.694-.833-3.464 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z"></path>
        </svg>
        <p class="text-amber-700 font-semibold text-lg">No Consta</p>
    </div>
    <p class="text-gray-600 mb-1">No se encontró Licencia, Registro Comercial o Aviso de Operación para {{ campo_label|default:"la búsqueda" }}:</p>
    <p class="text-gray-800 font-bold text-lg mb-4">{{ query }}</p>
    <p class="text-sm text-gray-500">
        Si presiona <strong>Agregar</strong>, se generará automáticamente el No Consta
        <strong>{{ noconsta_entry.frase_certificacion }}</strong>.
    </p>
</div>
