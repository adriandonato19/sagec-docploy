{% extends 'base.html' %}

{% block title %}Consultar Empresa - SAGEC{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto">
    <h1 class="text-2xl font-bold mb-6 text-gray-800">Consultar Empresa</h1>
    
    <div class="bg-white shadow-lg rounded-lg p-6 mb-6">
        <form hx-get="{% url 'integracion:api_search' %}" 
              hx-target="#resultados" 
              hx-trigger="submit, keyup delay:500ms from:#ruc_input"
              class="flex gap-4">
            {% csrf_token %}
            <div class="flex-1">
                <label for="ruc_input" class="block text-sm font-medium text-gray-700 mb-2">
                    RUC o Número de Aviso
                </label>
                <input type="text" 
                       name="q" 
                       id="ruc_input" 
                       placeholder="Ej: 573584-1-447039"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div class="flex items-end">
                <button type="submit" 
                        class="bg-blue-900 text-white py-2 px-6 rounded-lg hover:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium">
                    Buscar
                </button>
            </div>
        </form>
    </div>
    
    <!-- Área de resultados (se actualiza vía HTMX) -->
    <div id="resultados">
        <div class="bg-white shadow-lg rounded-lg p-6 text-center text-gray-500">
            <p>Ingrese un RUC o número de aviso para buscar información de la empresa.</p>
        </div>
    </div>
</div>
{% endblock %}
